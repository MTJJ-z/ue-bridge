appdaemon:
  time_zone: Asia/Shanghai
  latitude: 0
  longitude: 0
  elevation: 0
  plugins:
    HASS:
      type: hass
      ha_url: http://homeassistant:8123
      token: "YOUR_LONG_LIVED_ACCESS_TOKEN"

    MQTT:
      type: mqtt
      client_host: core-mosquitto
      client_port: 1883
      client_id: appdaemon_ue_bridge
      client_user: "mqtt_user"
      client_password: "mqtt_password"
      namespace: mqtt